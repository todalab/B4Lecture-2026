model:
  hidden_channels: 8
  latent_channels: 4
dataset:
  train_list: data/train.txt
  val_list: data/val.txt
  test_list: data/test.txt
  sample_rate: 8000
  n_fft: 512
  hop_length: 160
  n_mels: 40
  target_frames: 40
train:
  seed: 42
  epochs: 10
  learning_rate: 0.001
  batch_size: 32
  epoch_per_val: 1
  epoch_per_ckpt: 3
  log_dir: tensorboard_logs
  ckpt_dir: ckpts
