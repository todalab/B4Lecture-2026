model:
  hidden_channels1: 32
  hidden_channels2: 16
  latent_channels: 8
dataset:
  train_list: src/dataloaders/train.txt
  val_list: src/dataloaders/eval.txt
  test_list: src/dataloaders/test.txt
  data_dir: ../data/dev/abundant
  sample_rate: 16000
  n_fft: 1024
  hop_length: 512
  n_mels: 64
  target_frames: 40
dataset_normal_and_anomaly:
  data_dir: ../data/dev
  train_list: src/dataloaders/normal_and_anomaly_data_train.txt
  eval_list: src/dataloaders/normal_and_anomaly_data_eval.txt
train:
  seed: 42
  epochs: 40
  learning_rate: 0.00043284502212938834
  margin: 0.02
  lambda: 0.5
  batch_size: 128
  epoch_per_val: 1
  epoch_per_ckpt: 3
  log_dir: tensorboard_logs
  ckpt_dir: ckpts
