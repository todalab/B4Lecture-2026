model:
  hidden_channels: 28
  latent_channels: 4
dataset:
  train_list: src/dataloaders/train.txt
  val_list: src/dataloaders/eval.txt
  test_list: src/dataloaders/test.txt
  data_dir: ../data/dev/abundant
  sample_rate: 8000
  n_fft: 512
  hop_length: 160
  n_mels: 40
  target_frames: 40
dataset_normal_and_anomaly:
  train_list: src/dataloaders/normal_and_anomaly_data_train
  eval_list: src/dataloaders/normal_and_anomaly_data_eval
train:
  seed: 42
  epochs: 10
  learning_rate: 0.00026587543983272726
  batch_size: 128
  epoch_per_val: 1
  epoch_per_ckpt: 3
  log_dir: tensorboard_logs
  ckpt_dir: ckpts
