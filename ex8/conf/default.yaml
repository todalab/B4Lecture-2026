datadir: null
seed: 42

model:
  in_channels: 3
  out_channels: 3
  down_block_types:
    - "DownBlock2D"
    - "DownBlock2D"
  up_block_types:
    - "UpBlock2D"
    - "UpBlock2D"
  block_out_channels:
    - 128
    - 256

diffusion:
  num_timesteps: 500
  # noise_schedule: cosine
  # noise_schedule_kwargs:
  #   start: 0.0001
  #   end: 0.02
  noise_schedule: linear
  noise_schedule_kwargs:
    start: 0.0001
    end: 0.02

plot:
  num_samples: [8, 8]
  image_size: [3, 32, 32]
  every_n_epochs: 50

# 推論（サンプリング）設定
sampling:
  use_ddim: false   # true で DDIM（ステップをサブサンプリングして高速生成）
  ddim_steps: 50    # DDIM 使用時のサブサンプリング後のステップ数
  ddim_eta: 0.0     # 0.0 で決定的（DDIM）、1.0 で DDPM 相当

train:
  batch_size: 256
  num_epochs: 500

optimizer:
  lr: 1e-3
